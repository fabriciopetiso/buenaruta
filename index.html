<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="BuenaRuta - Compartí rutas de moto reales para salir a rodar" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BuenaRuta" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>BuenaRuta 🏍️</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Limpiar cache viejo una sola vez
      if (!localStorage.getItem('br_cache_cleared_v2')) {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(r => r.forEach(sw => sw.unregister()));
        }
        if ('caches' in window) {
          caches.keys().then(k => k.forEach(c => caches.delete(c)));
        }
        localStorage.setItem('br_cache_cleared_v2', '1');
        location.reload();
      } else {
        // Registrar SW nuevo
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
              .then(reg => console.log('SW registered:', reg.scope))
              .catch(err => console.log('SW registration failed:', err));
          });
        }
      }
    </script>
  </body>
</html>
