    <meta charset="UTF-8" />

    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="BuenaRuta - Compartí rutas de moto reales para salir a rodar" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BuenaRuta" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>BuenaRuta 🏍️</title>
    
    <!-- LIMPIEZA AGRESIVA DE SW - DEBE IR PRIMERO -->
    <script>
      (function() {
        if (sessionStorage.getItem('sw_cleaned')) {
          sessionStorage.removeItem('sw_cleaned');
          return;
        }
        
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            if (regs.length > 0) {
              Promise.all(regs.map(function(r) { return r.unregister(); })).then(function() {
                return caches.keys().then(function(names) {
                  return Promise.all(names.map(function(n) { return caches.delete(n); }));
                });
              }).then(function() {
                sessionStorage.setItem('sw_cleaned', 'true');
                window.location.reload(true);
              });
            }
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
